services:

  airflow:
    image: apache/airflow:2.10.0

    container_name: airflow

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      KAFKA_BROKER: kafka:9092

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../:/opt/airflow/project

    command: standalone